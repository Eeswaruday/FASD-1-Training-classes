<!DOCTYPE html>
<html>
<head>
    <title>CSS Font and Text Example</title>

    <style>
        /* font-size */
        .size {
            font-size: 25px;
        }

        /* font-weight */
        .weight {
            font-weight: bold;
        }

        /* font-style */
        .style {
            font-style: italic;
        }

        /* text-decoration */
        .decoration {
            text-decoration: underline;
        }

        /* text-transform */
        .transform {
            text-transform: uppercase;
        }

        /* text-align */
        .align {
            text-align: center;
        }
    </style>

</head>
<body>

    <p class="size">This is font-size example</p>

    <p class="weight">This is font-weight example</p>

    <p class="style">This is font-style example</p>

    <p class="decoration">This is text-decoration example</p>

    <p class="transform">This is text-transform example</p>

    <p class="align">This is text-align example</p>

</body>
</html>
