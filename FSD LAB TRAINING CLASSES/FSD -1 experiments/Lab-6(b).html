<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Output Methods</title>

    <script>
        function showOutputs() {

            // 1. Using alert()
            alert("This is alert output");

            // 2. Using document.write()
            document.write("<h3>This is document.write output</h3>");

            // 3. Using innerHTML
            document.getElementById("output").innerHTML = "This is innerHTML output";

            // 4. Using console.log()
            console.log("This is console output");
        }
    </script>

</head>
<body>

    <h2>JavaScript Output Methods</h2>

    <button onclick="showOutputs()">Click to Show Outputs</button>

    <p id="output"></p>

</body>
</html>
