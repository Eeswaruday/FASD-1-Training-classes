<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- Internal CSS -->
    <style>
        /* Selector: h2 */
        /* Property: color */
        /* Value: blue */
        h2 {
            color: blue;
        }
    </style>

    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Inline CSS -->
    <!-- Selector: p (this paragraph only) -->
    <!-- Property: color -->
    <!-- Value: red -->
    <p style="color: red;">This is Inline CSS</p>

    <!-- Internal CSS Applied -->
    <h2>This is Internal CSS</h2>

    <!-- External CSS Applied -->
    <h3>This is External CSS</h3>

</body>
</html>











<!--external css-->
/* Selector: h3 */
/* Property: color */
/* Value: green */
h3 {
    color: green;
}
