<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Example</title>

    <style>
        /* -------- SIMPLE SELECTORS -------- */

        /* Element selector */
        p {
            color: blue;
        }

        /* ID selector */
        #main {
            color: red;
        }

        /* Class selector */
        .box {
            background-color: lightgray;
        }

        /* Group selector */
        h1, h2 {
            color: green;
        }

        /* Universal selector */
        * {
            font-family: Arial;
        }

        /* -------- COMBINATOR SELECTORS -------- */

        /* Descendant selector */
        div p {
            background-color: yellow;
        }

        /* Child selector */
        div > h3 {
            color: purple;
        }

        /* Adjacent sibling selector */
        h1 + p {
            color: orange;
        }

        /* General sibling selector */
        h2 ~ p {
            color: brown;
        }

        /* -------- PSEUDO-CLASS SELECTOR -------- */

        a:hover {
            color: red;
        }

        /* -------- PSEUDO-ELEMENT SELECTOR -------- */

        p::first-letter {
            font-size: 30px;
        }

        /* -------- ATTRIBUTE SELECTOR -------- */

        input[type="text"] {
            border: 2px solid blue;
        }

    </style>
</head>

<body>

    <h1>Heading 1</h1>
    <p>This paragraph comes after h1 (adjacent sibling)</p>

    <h2>Heading 2</h2>
    <p>This is general sibling of h2</p>

    <div>
        <p>Paragraph inside div (descendant)</p>
        <h3>Child heading (child selector)</h3>
    </div>

    <p id="main">This is ID selector example</p>

    <p class="box">This is class selector example</p>

    <a href="#">Hover over this link</a><br><br>

    <input type="text" placeholder="Enter text here">

</body>
</html>
