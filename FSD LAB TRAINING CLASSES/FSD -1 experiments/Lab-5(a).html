<!DOCTYPE html>
<html>
<head>
    <title>CSS Color Types</title>

    <style>
        /* Color Name */
        .color-name {
            color: red;
        }

        /* Hexadecimal */
        .hex {
            color: #00FF00;
        }

        /* RGB */
        .rgb {
            color: rgb(0, 0, 255);
        }

        /* RGBA (with transparency) */
        .rgba {
            color: rgba(255, 0, 0, 0.5);
        }

        /* HSL */
        .hsl {
            color: hsl(120, 100%, 50%);
        }

        /* HSLA (with transparency) */
        .hsla {
            color: hsla(240, 100%, 50%, 0.5);
        }
    </style>

</head>
<body>

    <h2 class="color-name">This is Color Name (red)</h2>

    <h2 class="hex">This is Hex Color (#00FF00)</h2>

    <h2 class="rgb">This is RGB Color (blue)</h2>

    <h2 class="rgba">This is RGBA Color (transparent red)</h2>

    <h2 class="hsl">This is HSL Color (green)</h2>

    <h2 class="hsla">This is HSLA Color (transparent blue)</h2>

</body>
</html>
