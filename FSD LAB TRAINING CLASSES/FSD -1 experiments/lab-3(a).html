<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Tags Example</title>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Simple Webpage</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content -->
    <main>

        <!-- Section -->
        <section>
            <h2>Welcome Section</h2>
            <p>This is a <span style="color:blue;">simple</span> webpage using HTML5 tags.</p>
        </section>

        <!-- Article -->
        <article>
            <h2>Article Title</h2>
            <p>This is an article about HTML5 semantic tags.</p>

            <!-- Figure -->
            <figure>
                <img src="https://via.placeholder.com/150" alt="Sample Image">
                <figcaption>This is a sample image</figcaption>
            </figure>
        </article>

        <!-- Aside -->
        <aside>
            <h3>Side Information</h3>
            <p>This is some extra information in aside.</p>
        </aside>

    </main>

    <!-- Div Example -->
    <div>
        <p>This is inside a div container.</p>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
