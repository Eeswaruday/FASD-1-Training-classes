<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model Example</title>

    <style>
        .box {
            width: 300px;
            height: 150px;

            /* Content */
            background-color: lightblue;

            /* Padding (space inside border) */
            padding: 20px;

            /* Border */
            border: 5px solid black;

            /* Margin (space outside border) */
            margin: 30px;
        }
    </style>

</head>
<body>

    <h2>CSS Box Model Example</h2>

    <div class="box">
        This is the content area.
    </div>

</body>
</html>
