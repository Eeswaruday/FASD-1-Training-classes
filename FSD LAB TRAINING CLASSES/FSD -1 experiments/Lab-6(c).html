<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Input Methods</title>

    <script>
        function getInputs() {

            // 1. Using prompt()
            let name = prompt("Enter your name:");
            alert("Hello " + name);

            // 2. Using input field (HTML form)
            let value = document.getElementById("userInput").value;
            document.getElementById("result").innerHTML = "You entered: " + value;
        }
    </script>

</head>
<body>

    <h2>JavaScript Input Methods</h2>

    <!-- Input field -->
    <input type="text" id="userInput" placeholder="Enter something">

    <br><br>

    <button onclick="getInputs()">Submit</button>

    <p id="result"></p>

</body>
</html>
